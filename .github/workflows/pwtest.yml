name: Playwright Tests

on:
  workflow_dispatch:

# 1. ADD THIS: Allows the workflow to publish the report website to gh-pages
permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  test:
    timeout-minutes: 15
    runs-on: ubuntu-latest
    # Run the job inside the official Playwright Docker container
    container:
      image: mcr.microsoft.com/playwright:v1.60.0-noble # Match this to your package.json playwright version
      options: --user root

    steps:
    - uses: actions/checkout@v4

    - name: Setup Pages
      uses: actions/configure-pages@v5
    
    # Node.js is pre-installed in the image, but this ensures the correct version context
    - uses: actions/setup-node@v4
      with:
        node-version: lts/*
        
    - name: Install dependencies
      run: npm ci
      
    # NOTICE: The "Install Playwright Browsers" step is completely gone!
      
    # We add the CI=true env variable so Playwright knows it's running headless in CI
    - name: Run Playwright tests
      env:
        CI: true 
        PLAYWRIGHT_JSON_OUTPUT_NAME: playwright-report/results.json
      run: npx playwright test --project=chromium

    - name: Upload Playwright Report
      id: artifact-upload
      uses: actions/upload-pages-artifact@v3
      if: always()
      with:
        path: playwright-report/

  deploy:
    if: ${{ !cancelled() }}
    needs: test
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
    - name: Deploy to GitHub Pages
      id: deployment
      uses: actions/deploy-pages@v4
